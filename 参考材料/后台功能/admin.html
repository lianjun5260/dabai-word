function toggleResolveLemmaGroup() {
  const type = $('fResolveType').value;
  $('resolveLemmaGroup').style.display = type==='base'?'none':'block';
}

function confirmResolveInflection(id) {
  const w = appState.words.find(w=>w.id===id);
  if(!w) return;
  const type = $('fResolveType').value;
  const isBase = type==='base';
  const lemma = isBase ? null : ($('fResolveLemma')?.value?.trim()||null);
  const addToTable = $('fAddToRuleTable')?.checked !== false;
  
  if(!isBase) {
    if(!lemma) { toast('请输入关联原形主词','error'); return; }
    // 校验原形是否已在单词库中
    const mainWord = appState.words.find(mw=>mw.word.toLowerCase()===lemma.toLowerCase());
    if(!mainWord) { toast(`「${lemma}」不在单词库中，请确认输入正确`,'warning'); }
  }
  
  w.inflectionPending = false;
  
  if(!isBase && lemma) {
    // 设置 word_relate
    const relType = type==='regular'?'regular':type;
    w.wordRelate = JSON.stringify({lemma, type: relType});
    
    // 如果是规则变形：不建新词，频次归集到主词
    if(type==='regular') {
      const mainWord = appState.words.find(mw=>mw.word.toLowerCase()===lemma.toLowerCase());
      if(mainWord) {
        // 频次转移
        if(w.tagFreq) {
          for(const [k,v] of Object.entries(w.tagFreq)) {
            if(!mainWord.tagFreq) mainWord.tagFreq = {};
            mainWord.tagFreq[k] = (mainWord.tagFreq[k]||0) + v;
          }
        }
        mainWord.totalFreq = (mainWord.totalFreq||0) + (w.totalFreq||0);
        // 删除当前词条
        appState.words = appState.words.filter(wk=>wk.id!==id);
        appState.logs.unshift({ id:appState.nextLogId++, operator:'admin', type:'归集确认', target:'word', targetId:String(id), targetName:w.word, detail:JSON.stringify({type:'regular',lemma,action:'merged_to_main',freqTransferred:w.totalFreq}), result:1, ip:'192.168.1.100', time:new Date().toISOString().slice(0,19).replace('T',' ') });
        toast(`「${w.word}」已作为规则变形归集到「${lemma}」，词条已合并`,'success');
        closeModal(); renderReview(); updateReviewBadge(); refreshAll();
        return;
      }
    }
    
    // 不规则变形：保留词条，建立关联
    const mainWord = appState.words.find(mw=>mw.word.toLowerCase()===lemma.toLowerCase());
    if(mainWord) {
      // 双向设置word_relate
      mainWord.wordRelate = mainWord.wordRelate ? 
        JSON.stringify({inflected:[...(JSON.parse(mainWord.wordRelate).inflected||[]), w.word], type:relType}) :
        JSON.stringify({inflected:[w.word], type:relType});
    }
  }
  
  // 加入规则表
  if(addToTable && !isBase && lemma) {
    appState.inflectionRules.push({ id:appState.nextInflectionId++, inflected:w.word, lemma, type, priority:1 });
  }
  
  appState.logs.unshift({ id:appState.nextLogId++, operator:'admin', type:'归集确认', target:'word', targetId:String(id), targetName:w.word, detail:JSON.stringify({type,lemma,addToTable}), result:1, ip:'192.168.1.100', time:new Date().toISOString().slice(0,19).replace('T',' ') });
  toast(`「${w.word}」归集已确认`,'success');
  closeModal(); renderReview(); updateReviewBadge();
}

  if(f.group) list = list.filter(t=>t.group===f.group);
  if(f.status!=='') list = list.filter(t=>t.status===parseInt(f.status));
  return list;

function saveTag(isEdit) {
  const id = parseInt($('fTagId').value);
  const name = $('fTagName').value.trim();
  const group = $('fTagGroup').value.trim();
  const sort = parseInt($('fTagSort').value)||0;

  if(!name) { toast('标签名称不能为空','error'); return; }

  if(isEdit) {
    const t = appState.tags.find(t=>t.id===id);
    if(!t) return;
    const oldName = t.name;
    t.name = name; t.group = group; t.sort = sort;
    t.status = parseInt($('fTagStatus').value);
    // Update word stage labels
    let affectedCount = 0;
    appState.words.forEach(w=>{
      if(w.stageLabel&&w.stageLabel.includes(oldName)){
        w.stageLabel = w.stageLabel.split(',').map(s=>s.trim()===oldName?name:s.trim()).join(',');
        affectedCount++;
      }
    });
    appState.logs.unshift({ id:appState.nextLogId++, operator:'admin', type:'标签编辑', target:'tag', targetId:String(id), targetName:name, detail:JSON.stringify({oldName,affectedWords:affectedCount}), result:1, ip:'192.168.1.100', time:new Date().toISOString().slice(0,19).replace('T',' ') });
    toast('标签更新成功','success');
  } else {
    if(appState.tags.some(t=>t.name===name)) { toast('标签名称已存在','error'); return; }
    const newId = appState.nextTagId++;
    appState.tags.push({ id:newId, name, group:group||'未分组', sort, status:1, wordCount:0 });
    appState.logs.unshift({ id:appState.nextLogId++, operator:'admin', type:'标签新增', target:'tag', targetId:String(newId), targetName:name, detail:JSON.stringify({group:group||'未分组'}), result:1, ip:'192.168.1.100', time:new Date().toISOString().slice(0,19).replace('T',' ') });
    toast(`标签「${name}」创建成功`,'success');
  }
  closeModal(); renderTags();
  // Refresh word filter select
  if(appState.currentPage==='words') renderWords();
}

function toggleTagStatus(id) {
  const t = appState.tags.find(t=>t.id===id);
  if(!t) return;
  t.status = t.status===1?0:1;
  appState.logs.unshift({ id:appState.nextLogId++, operator:'admin', type:t.status===1?'标签启用':'标签禁用', target:'tag', targetId:String(id), targetName:t.name, detail:JSON.stringify({newStatus:t.status}), result:1, ip:'192.168.1.100', time:new Date().toISOString().slice(0,19).replace('T',' ') });
  toast(`标签「${t.name}」已${t.status===1?'启用':'禁用'}`,'success');
  renderTags();
}

function deleteTag(id) {
  const t = appState.tags.find(t=>t.id===id);
  if(!t) return;
  showConfirm(`确定删除标签「${t.name}」？`,'删除后所有单词上该标签的绑定将自动清除，不可恢复。',()=>{
    appState.tags = appState.tags.filter(t=>t.id!==id);
    let affectedCount = 0;
    appState.words.forEach(w=>{
      if(w.stageLabel&&w.stageLabel.includes(t.name)){
        w.stageLabel = w.stageLabel.split(',').filter(s=>s.trim()!==t.name).join(',');
        affectedCount++;
      }
      if(w.tagFreq&&w.tagFreq[t.name]){ delete w.tagFreq[t.name]; }
    });
    appState.logs.unshift({ id:appState.nextLogId++, operator:'admin', type:'标签删除', target:'tag', targetId:String(id), targetName:t.name, detail:JSON.stringify({affectedWords:affectedCount}), result:1, ip:'192.168.1.100', time:new Date().toISOString().slice(0,19).replace('T',' ') });
    toast(`标签「${t.name}」已删除`,'success');
    renderTags();
  });
}

  if(newPwd === oldPwd) { toast('新密码不能与当前密码相同','error'); return; }
  appState.logs.unshift({ id:appState.nextLogId++, operator:'admin', type:'修改密码', target:'admin', targetId:'1', targetName:appState.currentUser.username, detail:JSON.stringify({changed:true}), result:1, ip:'192.168.1.100', time:new Date().toISOString().slice(0,19).replace('T',' ') });
  toast('密码修改成功，请牢记新密码','success');
  closeModal();
}

function renderInflections() {
  const typeNames = {'regular':'规则变形','irregular_past':'不规则过去式','irregular_plural':'不规则复数','irregular_comp':'不规则比较级','variant':'异形词'};
  const priorityNames = {0:'内置',1:'AI生成',2:'低置信'};
  const rules = appState.inflectionRules;
  
  $('inflectionFilterBar').innerHTML = `
    <input class="search-input" placeholder="搜索变形词/原形..." oninput="filterInflections('keyword',this.value)" style="width:200px;">
    <select onchange="filterInflections('type',this.value)">
      <option value="">全部类型</option>
      ${Object.entries(typeNames).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}
    </select>
    <span style="font-size:12px;color:var(--text-secondary);">共 ${rules.length} 条规则</span>
  `;
  
  const keyword = (window._inflectionFilter||{keyword:'',type:''}).keyword||'';
  const typeFilter = (window._inflectionFilter||{keyword:'',type:''}).type||'';
  let filtered = rules;
  if(keyword) filtered = filtered.filter(r=>r.inflected.includes(keyword)||r.lemma.includes(keyword));
  if(typeFilter) filtered = filtered.filter(r=>r.type===typeFilter);
  
  const ip = appState.inflectionPage, ipp = appState.pageSizes.inflections;
  const iTotal = Math.ceil(filtered.length/ipp)||1;
  const iPaged = filtered.slice((ip-1)*ipp, ip*ipp);
  setTableHTML('inflectionTable', `
    <thead><tr>
      <th>ID</th><th>变形词</th><th>原形</th><th>类型</th><th>来源</th><th style="width:200px;">操作</th>
    </tr></thead>
    <tbody>${iPaged.map(r=>`
      <tr>
        <td>${r.id}</td>
        <td style="font-weight:600;">${r.inflected}</td>
        <td style="color:var(--primary);">${r.lemma}</td>
        <td><span class="tag-badge ${r.type==='regular'?'tag-green':r.type==='variant'?'tag-purple':'tag-blue'}">${typeNames[r.type]||r.type}</span></td>
        <td><span class="status-badge ${r.priority===0?'online':r.priority===2?'review':'pending'}">${priorityNames[r.priority]||'未知'}</span></td>
        <td class="col-actions">
          <button class="btn btn-secondary btn-sm" onclick="editInflectionRule(${r.id})">编辑</button>
          ${r.priority===1||r.priority===2?`<button class="btn btn-success btn-sm" onclick="confirmInflectionRule(${r.id})">确认</button>`:''}
          <button class="btn btn-danger btn-sm" onclick="deleteInflectionRule(${r.id})">删除</button>
        </td>
      </tr>
    `).join('')}</tbody>`);
  $('inflectionPagination').innerHTML = renderPagination(ip, iTotal, 'goInflectionPage', 'inflections', filtered.length);
}
function filterInflections(field, value) { window._inflectionFilter = window._inflectionFilter||{keyword:'',type:''}; window._inflectionFilter[field]=value; renderInflections(); }

function viewPhraseDetail(id) {
  const p = appState.phrases.find(p=>p.id===id);
  if(!p) return;
  $('modalTitle').textContent = '短语详情 \u2014 '+p.phrase;
  $('modalBox').classList.add('wide');
  // sentences
  let sh = '<span class="empty-hint">暂无例句</span>';
  try {
    const s = JSON.parse(p.sentences||'[]');
    if(Array.isArray(s) && s.length>0) {
      sh = s.map((sen,i)=>{
        const hl = (sen.text||'').replace(/\[([^\]]+)\]/g, '<span class="hl">$1</span>');
        return '<div class="sentence-card"><div class="sentence-index">例句 '+(i+1)+'</div><div class="sentence-en">'+hl+'</div>'+(sen.translation?'<div class="sentence-cn">'+sen.translation+'</div>':'')+'</div>';
      }).join('');
    }
  } catch(e) {}
  // freq
  let fd = '';
  if(p.tagFreq && Object.keys(p.tagFreq).length>0) {
    const entries = Object.entries(p.tagFreq).sort((a,b)=>b[1]-a[1]);
    const max = entries[0]?.[1]||1;
    fd = entries.map(([t,v])=>'<div class="detail-freq-row"><span class="freq-label">'+t+'</span><div class="freq-bar-wrap"><div class="freq-bar-fill" style="width:'+Math.round(v/max*100)+'%"></div></div><span class="freq-val">'+v+'</span></div>').join('');
  }

  $('modalBody').innerHTML = '<div class="detail-card"><div class="detail-word-title">'+p.phrase+' <span class="status-badge '+statusClass(p.status)+'">'+statusText(p.status)+'</span></div><div class="detail-meta-row"><span class="meta-item"><span class="meta-label">来源</span> '+(['手动新增','资源库AI识别'][p.source]||'未知')+'</span><span class="meta-item"><span class="meta-label">ID</span> '+p.id+'</span></div><div class="detail-meaning">'+p.meaning+'</div></div>'+(p.stageLabel?'<div class="detail-card"><div class="detail-card-title">🏷️ 绑定标签</div><div>'+renderAllTags(p.stageLabel)+'</div></div>':'')+'<div class="detail-card"><div class="detail-card-title">📊 频次统计</div><div class="detail-freq-total">总频次：'+(p.totalFreq||0)+'</div>'+(fd||'<span class="empty-hint">暂无频次数据</span>')+'</div><div class="detail-card"><div class="detail-card-title">💬 例句</div>'+sh+'</div><div class="detail-card"><div class="detail-card-title">ℹ️ 基本信息</div><div class="detail-info-row"><span>创建时间：'+(p.createTime||'-')+'</span><span>更新时间：'+(p.updateTime||'-')+'</span></div></div>';
  $('modalFooter').innerHTML = '<button class="btn btn-secondary" onclick="closeModal()">关闭</button>';
  showModal();
}

function openPhraseModal(id) {
  const p = appState.phrases.find(p=>p.id===id);
  if(!p) return;
  if(p.status===1) { toast('已上架短语需先下架再编辑','warning'); return; }
  $('modalTitle').textContent = '编辑短语 \u2014 '+p.phrase;
  $('modalBox').classList.add('wide');

function addPSentenceRow() { const idx = document.querySelectorAll('#pSentencesContainer .dyn-row').length + 1; appendPSRow(idx,'',''); }

function savePhraseEdit(id) {
  const p = appState.phrases.find(p=>p.id===id);

  p.stageLabel = $('editPSLabel').value.trim()||p.stageLabel;

function restorePhrase(id) {
  const p = appState.phrases.find(p=>p.id===id);

  showConfirm('确定恢复\u300c'+p.phrase+'\u300d？', '恢复后进入短语审核池重新审核。', ()=>{
    p.status = 3; p.updateTime = new Date().toISOString().slice(0,16).replace('T',' ');
    renderPhraseBlacklist(); toast('\u300c'+p.phrase+'\u300d已恢复至审核池','success');
  });
}

function openInflectionModal(id) {

      <div class="form-group">
        <label>类型</label>
        <select id="fInflectionType">

          <option value="irregular_past" ${r&&r.type==='irregular_past'?'selected':''}>不规则过去式</option>

      </div>

        <select id="fInflectionPriority">
          <option value="0" ${r&&r.priority===0?'selected':''}>内置（不可删除）</option>
          <option value="1" ${r&&r.priority===1?'selected':''}>AI生成</option>
          <option value="2" ${r&&r.priority===2?'selected':''}>低置信</option>
        </select>
      </div>
    </div>
  `;
  $('modalFooter').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">取消</button>
    <button class="btn btn-primary" onclick="saveInflectionRule(${isEdit?r.id:'null'})">保存</button>
  `;
  if(isEdit) $('modalBody').insertAdjacentHTML('beforeend', `<input type="hidden" id="fInflectionId" value="${r.id}">`);
  showModal();
}

function saveInflectionRule(editId) {
  const inflected = ($('fInflected')?.value||'').trim();
  const lemma = ($('fLemma')?.value||'').trim();
  const type = ($('fInflectionType')?.value||'regular');
  const priority = parseInt($('fInflectionPriority')?.value||'1');
  if(!inflected||!lemma){ toast('变形词和原形不能为空','error'); return; }
  if(editId && editId !== 'null') {
    const r = appState.inflectionRules.find(r=>r.id===editId);
    if(!r) return;
    r.inflected = inflected; r.lemma = lemma; r.type = type; r.priority = priority;
    toast('规则更新成功','success');
  } else {
    if(appState.inflectionRules.some(r=>r.inflected===inflected&&r.type===type)){ toast('该规则已存在','error'); return; }
    appState.inflectionRules.push({ id:appState.nextInflectionId++, inflected, lemma, type, priority });
    toast(`规则「${inflected}→${lemma}」已添加`,'success');
  }
  closeModal(); renderInflections();
}

function editInflectionRule(id) { openInflectionModal(id); }

function confirmInflectionRule(id) {
  const r = appState.inflectionRules.find(r=>r.id===id);
  if(!r) return;
  r.priority = 0;
  toast(`规则「${r.inflected}→${r.lemma}」已确认`,'success');
  renderInflections();
}

function deleteInflectionRule(id) {
  const r = appState.inflectionRules.find(r=>r.id===id);
  if(!r) return;
  if(r.priority===0){ toast('内置规则不可删除','error'); return; }
  showConfirm(`确定删除规则「${r.inflected}→${r.lemma}」？`,'',()=>{
    appState.inflectionRules = appState.inflectionRules.filter(r=>r.id!==id);
    toast(`规则已删除`,'success');
    renderInflections();
  });
}

// ============================================================
// FOLDER TREE BUILDER (SRS §4.6.2.4)
// ============================================================
function buildFolderTreeHtml() {
  let html = '';

  // Root: "全部文件"
  const totalFiles = appState.files.filter(f => f.status === 0 || appState.resourceFilter.status !== '').length;
  html += `<div class="tree-all-files ${appState.selectedPath==='all' ? 'active' : ''}" onclick="selectTreeNode('all')">
    📁 全部文件 <span class="tree-badge">${totalFiles}</span>
  </div>`;

  // Group by tag group (from DEFAULT_TAGS)
  const tagGroups = {};
  appState.tags.forEach(t => { tagGroups[t.group] = tagGroups[t.group] || []; tagGroups[t.group].push(t.name); });

  for(const [groupName, tagNames] of Object.entries(tagGroups)) {
    // Count files in this group
    let groupFileCount = 0;
    tagNames.forEach(tn => {
      appState.files.filter(f => f.tag === tn && (f.status === 0 || appState.resourceFilter.status !== '')).forEach(() => groupFileCount++);
    });

    html += `<div class="tree-group-title">${groupName} <span class="group-count">${groupFileCount}</span></div>`;
    html += `<div class="tree-group-body">`;

    tagNames.forEach(tagName => {
      const folders = MOCK_FOLDERS[tagName] || [{ name:'默认', icon:'📂', type:'default' }];
      const tagFiles = appState.files.filter(f => f.tag === tagName);
      const activeTagFiles = tagFiles.filter(f => f.status === 0 || appState.resourceFilter.status !== '');
      const isExpanded = appState.expandedTags.has(tagName);
      const isSelectedTag = appState.selectedPath && appState.selectedPath.tag === tagName && !appState.selectedPath.folder;
      const isSelectedInSubtree = appState.selectedPath && appState.selectedPath.tag === tagName;

      html += `<div class="tree-tag-node ${isSelectedTag ? 'active' : ''}" data-tag="${tagName}"
        onclick="event.stopPropagation(); selectTreeNode('tag','${tagName}')">`;

      // Expand arrow + name + badge + add button
      html += `<span class="tree-tag-arrow ${isExpanded ? 'expanded' : ''}" onclick="event.stopPropagation(); toggleTagExpand('${tagName}')">▶</span>`;
      html += `<span class="tree-tag-name">${tagName}</span>`;
      html += `<span class="tree-tag-badge">${activeTagFiles.length}</span>`;
      html += `<button class="tree-tag-add-btn" onclick="event.stopPropagation(); showAddFolderModal('${tagName}')" title="新建文件夹">+</button>`;
      html += `</div>`;

      // Folder list (expandable)
      html += `<div class="tree-folder-list ${isExpanded ? 'expanded' : ''}" data-folders-of="${tagName}">`;
      folders.forEach(folder => {
        const folderFiles = activeTagFiles.filter(f => f.folder === folder.name);
        const isSelectedFolder = appState.selectedPath && appState.selectedPath.tag === tagName && appState.selectedPath.folder === folder.name;
        const isEditing = appState.editingFolder && appState.editingFolder.tag === tagName && appState.editingFolder.folder === folder.name;

        html += `<div class="tree-folder-node ${isSelectedFolder ? 'active' : ''}"
          data-folder-tag="${tagName}" data-folder-name="${folder.name}"
          oncontextmenu="showFolderContextMenu(event,'${tagName}','${folder.name}','${folder.type}')"
          onclick="event.stopPropagation(); selectTreeNode('folder','${tagName}','${folder.name}')">`;

        if(isEditing) {
          // Inline edit mode
          html += `<span class="tree-folder-icon">${folder.icon}</span>`;
          html += `<span class="tree-inline-edit"><input type="text" value="${folder.name}"
            onkeydown="handleFolderEditKeydown(event,'${tagName}','${folder.name}',this)"
            onblur="cancelFolderInlineEdit()" autofocus></span>`;
        } else {
          // Normal display
          html += `<span class="tree-folder-icon">${folder.icon}</span>`;
          html += `<span class="tree-folder-name" ondblclick="startRenameFolder('${tagName}','${folder.name}',event)">${folder.name}</span>`;
          html += `<span class="tree-folder-badge">${folderFiles.length}</span>`;

          // Action buttons (visible on hover)
          if(folder.type !== 'default') {
            html += `<span class="tree-folder-actions">
              <button class="tree-folder-action-btn" onclick="event.stopPropagation(); startRenameFolder('${tagName}','${folder.name}',event)" title="重命名">✏️</button>
              <button class="tree-folder-action-btn delete" onclick="event.stopPropagation(); confirmDeleteFolder('${tagName}','${folder.name}')" title="删除">🗑️</button>
            </span>`;
          }
        }
        html += `</div>`;
      });
      html += `</div>`; // end folder list
    });

    html += `</div>`; // end group body
  }

  return html;
}

function buildBreadcrumbHtml() {
  const p = appState.selectedPath;
  if(!p || p === 'all') return '';
  if(p.folder) {
    return `<a onclick="selectTreeNode('tag','${p.tag}')">${p.tag}</a>
      <span class="breadcrumb-sep">›</span>
      <span class="breadcrumb-current">${p.folder}</span>`;
  }
  return '';
}

// ============================================================
// TREE INTERACTIONS
// ============================================================
function selectTreeNode(type, tag, folder) {
  if(type === 'all') {
    appState.selectedPath = 'all';
    appState.resourceFilter.tag = '';
  } else if(type === 'tag') {
    appState.selectedPath = { tag };
    appState.resourceFilter.tag = tag;
    appState.resourceSelectedFolder = null;
    // Auto expand
    if(!appState.expandedTags.has(tag)) appState.expandedTags.add(tag);
  } else if(type === 'folder') {
    appState.selectedPath = { tag, folder };
    appState.resourceFilter.tag = tag;
    appState.resourceSelectedTag = tag;
    appState.resourceSelectedFolder = folder;
    // Auto expand parent
    if(!appState.expandedTags.has(tag)) appState.expandedTags.add(tag);
  }
  cancelFolderInlineEdit();
  hideContextMenu();
  renderResources();
}

function toggleTagExpand(tag) {
  if(appState.expandedTags.has(tag)) appState.expandedTags.delete(tag);
  else appState.expandedTags.add(tag);
  // Re-render just the tree part (optimization)
  const treeHtml = buildFolderTreeHtml();
  $('folderTree').innerHTML = `<div class="tree-root">${treeHtml}</div>`;
  // Re-bind breadcrumb
  const bc = $('resourceBreadcrumb');
  if(bc) { bc.innerHTML = buildBreadcrumbHtml(); bc.style.display = appState.selectedPath && appState.selectedPath !== 'all' ? 'flex' : 'none'; }
}

        <option value="模拟题">📋 模拟题</option>
        <option value="词汇表">📖 词汇表</option>
        <option value="听力材料">🎧 听力材料</option>
        <option value="阅读素材">📰 阅读素材</option>
      </select>
    </div>
  `;
  $('modalFooter').innerHTML = `

    <button class="btn btn-primary" onclick="confirmAddFolder('${tag}')">创建</button>
  `;
  showModal();
  setTimeout(()=> $('newFolderNameInput').focus(), 100);
}

function confirmAddFolder(tag) {
  const nameInput = $('newFolderNameInput');
  const typeSelect = $('newFolderTypeSelect');
  const name = nameInput.value.trim();
  const typeName = typeSelect.value;

  if(!name) { toast('请输入文件夹名称','error'); nameInput.focus(); return; }

  // Check duplicate
  const existing = MOCK_FOLDERS[tag] || [];
  if(existing.some(f => f.name === name)) {
    toast(`文件夹「${name}」已存在`,'error'); return;
  }

  const iconMap = {'教材':'📚','真题卷':'📝','模拟题':'📋','词汇表':'📖','听力材料':'🎧','阅读素材':'📰'};
  const newFolder = { name, icon: iconMap[typeName] || '📁', type: typeName };

  if(!MOCK_FOLDERS[tag]) MOCK_FOLDERS[tag] = [];
  MOCK_FOLDERS[tag].push(newFolder);

  // Log
  appState.logs.unshift({ id:appState.nextLogId++, operator:'admin', type:'文件夹创建', target:'folder', targetId:'', targetName:`${tag}/${name}`, detail:JSON.stringify({tag,folder:name,type:typeName}), result:1, ip:'192.168.1.100', time:new Date().toISOString().slice(0,19).replace('T',' ') });
  toast(`文件夹「${name}」已创建`,'success');
  closeModal();
  appState.expandedTags.add(tag); // auto expand to show new folder
  renderResources();
}

function startRenameFolder(tag, folder, event) {
  if(event) event.stopPropagation();
  appState.editingFolder = { tag, folder };
  // Re-render tree to show inline edit input
  const treeHtml = buildFolderTreeHtml();
  $('folderTree').innerHTML = `<div class="tree-root">${treeHtml}</div>`;
  // Focus the input
  setTimeout(()=>{
    const input = qs('.tree-inline-edit input');
    if(input) { input.focus(); input.select(); }
  }, 50);
}

function handleFolderEditKeydown(event, tag, oldName, inputEl) {
  if(event.key === 'Enter') {
    event.preventDefault();
    confirmFolderRename(tag, oldName, inputEl.value.trim());
  } else if(event.key === 'Escape') {
    event.preventDefault();
    cancelFolderInlineEdit();
  }
}

function confirmFolderRename(tag, oldName, newName) {
  if(!newName || newName === oldName) { cancelFolderInlineEdit(); return; }
  // Check duplicate
  const siblings = MOCK_FOLDERS[tag] || [];
  if(siblings.some(f => f.name === newName && f.name !== oldName)) {
    toast(`文件夹「${newName}」已存在`,'error'); return;
  }
  // Update
  const folder = siblings.find(f => f.name === oldName);
  if(folder) folder.name = newName;
  // Update file references
  appState.files.forEach(f => { if(f.tag === tag && f.folder === oldName) f.folder = newName; });
  appState.logs.unshift({ id:appState.nextLogId++, operator:'admin', type:'文件夹重命名', target:'folder', targetId:'', targetName:`${tag}/${oldName}`, detail:JSON.stringify({old:oldName,new:newName}), result:1, ip:'192.168.1.100', time:new Date().toISOString().slice(0,19).replace('T',' ') });
  appState.editingFolder = null;
  toast(`文件夹已重命名为「${newName}」`,'success');
  renderResources();
}

function cancelFolderInlineEdit() {
  appState.editingFolder = null;
}

function confirmDeleteFolder(tag, folderName) {
  // Check if folder has files (per SRS §4.6.2.1)
  const filesInFolder = appState.files.filter(f => f.tag === tag && f.folder === folderName);
  if(filesInFolder.length > 0) {
    showConfirm(
      `⚠️ 无法删除`,
      `文件夹「${folderName}」下存在 ${filesInFolder.length} 个文件，请先移出或删除文件后再删除文件夹。`,
      () => {}
    );
    return;
  }
  // Empty folder - confirm delete
  showConfirm(
    `确定删除文件夹「${folderName}」？`,
    '删除后不可恢复。',
    () => {
      const folders = MOCK_FOLDERS[tag];
      if(folders) {
        const idx = folders.findIndex(f => f.name === folderName);
        if(idx >= 0) folders.splice(idx, 1);
      }
      // Clear selection if this was selected
      if(appState.selectedPath && appState.selectedPath.tag === tag && appState.selectedPath.folder === folderName) {
        selectTreeNode('tag', tag);
      } else {
        renderResources();
      }
      appState.logs.unshift({ id:appState.nextLogId++, operator:'admin', type:'文件夹删除', target:'folder', targetId:'', targetName:`${tag}/${folderName}`, result:1, ip:'192.168.1.100', time:new Date().toISOString().slice(0,19).replace('T',' ') });
      toast(`文件夹「${folderName}」已删除`,'success');
    }
  );
}

function showFolderContextMenu(event, tag, folderName, folderType) {
  event.preventDefault();
  event.stopPropagation();
  contextMenuTarget = { tag, folderName, folderType };
  const menu = $('treeContextMenu');
  menu.innerHTML = `
    <div class="ctx-menu-item" onclick="ctxAction('rename')"><span class="ctx-icon">✏️</span> 重命名</div>
    <div class="ctx-menu-divider"></div>
    <div class="ctx-menu-item danger" onclick="ctxAction('delete')"><span class="ctx-icon">🗑️</span> 删除文件夹</div>
  `;
  // Position near mouse
  menu.style.left = event.clientX + 'px';
  menu.style.top = event.clientY + 'px';
  menu.classList.add('show');
  // Adjust if off screen
  requestAnimationFrame(() => {
    const rect = menu.getBoundingClientRect();
    if(rect.right > window.innerWidth) menu.style.left = (window.innerWidth - rect.width - 8) + 'px';
    if(rect.bottom > window.innerHeight) menu.style.top = (window.innerHeight - rect.height - 8) + 'px';
  });
}

}

// ===== 频次归零→清空标签 (SRS v2.21新增规则) =====
function rollbackFreq(w) {
  // 回滚频次: 扣减 totalFreq 和 tagFreq
  const rollback = w.totalFreq;
  w.totalFreq = Math.max(0, w.totalFreq - rollback);
  if(w.tagFreq) {
    for(const k in w.tagFreq) { w.tagFreq[k] = Math.max(0, w.tagFreq[k] - Math.floor(rollback/Object.keys(w.tagFreq).length)); }
  }
  clearTagsIfFreqZero(w);
}

function clearTagsIfFreqZero(w) {
  if(w.totalFreq <= 0) {
    w.stageLabel = '';
    if(w.tagFreq) { for(const k in w.tagFreq) { w.tagFreq[k] = 0; } }
  }
}

// 检查所有受影响的单词（模拟：找到被操作文件关联的单词并清理标签）
function checkAndClearTagsForFile(file) {
  // 模拟：找到 tag 匹配且可能有频次影响的单词
  appState.words.forEach(w => {
    if(w.totalFreq <= 0 && w.stageLabel) { w.stageLabel = ''; }
    if(w.tagFreq) { for(const k in w.tagFreq) { if(w.tagFreq[k] <= 0) delete w.tagFreq[k]; } }
  });
}

// ===== 批量移动文件 (SRS §4.6.2.3) =====
function batchMoveFiles() {
  const checked = qsa('.res-cb:checked');
  if(checked.length===0) { toast('请先勾选要移动的文件','warning'); return; }
  
  // 获取被选文件的共同标签
  const fileIds = Array.from(checked).map(c=>c.getAttribute('data-id'));
  const files = fileIds.map(id=>appState.files.find(f=>f.id===id)).filter(Boolean);
  if(files.length===0) return;
  
  const tag = files[0].tag;
  // 确保所有文件属于同一标签
  if(files.some(f=>f.tag!==tag)) { toast('只能移动同标签下的文件','warning'); return; }
  
  const tagFolders = (appState.folders[tag]||['默认']).filter(f=>typeof f==='object'?f.name:f!=='默认').map(f=>typeof f==='object'?f.name:f);
  if(tagFolders.length===0) { toast('该标签下暂无其他文件夹可移动','warning'); return; }
  
  $('modalTitle').textContent = '批量移动文件';
  $('modalBox').classList.remove('wide');
  $('modalBody').innerHTML = `
    <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px;">已将 <strong>${files.length}</strong> 个文件从「${tag}」标签下移出，请选择目标文件夹：</p>
    <div style="max-height:200px;overflow-y:auto;">
      ${tagFolders.map(f=>{
        const currentFolder = files[0].folder;
        const isCurrent = f === currentFolder;
        return `<div class="upload-tree-folder${isCurrent?' active':''}" onclick="document.querySelectorAll('.move-target-folder').forEach(el=>el.classList.remove('active'));this.classList.add('active');window._moveTarget='${f}'" style="padding:8px 12px;cursor:pointer;border-radius:6px;margin:2px 0;display:flex;align-items:center;gap:8px;">
          <span>📂</span> <span>${f}</span> ${isCurrent?'<span style="font-size:11px;color:var(--text-tertiary);margin-left:auto;">（当前位置）</span>':''}
        </div>`;
      }).join('')}
    </div>
    <input type="hidden" id="moveTargetFolder" value="">
  `;
  $('modalFooter').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">取消</button>
    <button class="btn btn-primary" onclick="executeBatchMove('${tag}','${fileIds.join(',')}')">确认移动</button>
  `;
  window._moveTarget = files[0].folder; // default to current
  showModal();
}

function executeBatchMove(tag, fileIdsStr) {
  const targetFolder = window._moveTarget;
  if(!targetFolder) { toast('请选择目标文件夹','warning'); return; }
  const fileIds = fileIdsStr.split(',');
  let moved = 0;
  fileIds.forEach(id=>{
    const f = appState.files.find(fl=>fl.id===id);
    if(f && f.tag===tag && f.folder!==targetFolder) {
      f.folder = targetFolder;
      moved++;
    }
  });
  if(moved===0) { closeModal(); return; }
  appState.logs.unshift({ id:appState.nextLogId++, operator:'admin', type:'文件移动', target:'file', targetId:fileIdsStr, targetName:`${moved}个文件 → ${targetFolder}`, detail:JSON.stringify({tag,targetFolder,count:moved}), result:1, ip:'192.168.1.100', time:new Date().toISOString().slice(0,19).replace('T',' ') });
  toast(`已移动 ${moved} 个文件到「${targetFolder}」`,'success');
  closeModal();
  renderResources();
}

function invalidateFile(id) {
  const f = appState.files.find(fl=>fl.id===id);
  if(!f) return;
  showConfirm(`确定将「${f.name}」设为失效？`,'对应频次将全额扣减，文件可恢复。',()=>{
    f.status = 1; f.freqIncrement = 0; f.wordCount = 0;
    appState.logs.unshift({ id:appState.nextLogId++, operator:'admin', type:'文件失效', target:'file', targetId:id, targetName:f.name, detail:JSON.stringify({freq_rollback:f.freqIncrement}), result:1, ip:'192.168.1.100', time:new Date().toISOString().slice(0,19).replace('T',' ') });
    checkAndClearTagsForFile(f);
    toast(`「${f.name}」已失效`,'warning');
    renderResources();
  });
}

function restoreFile(id) {
  const f = appState.files.find(fl=>fl.id===id);
  if(!f) return;
  const origFreq = {f001:450,f003:250,f006:0,f007:0}[id]||100;
  f.status = 0; f.freqIncrement = origFreq;
  appState.logs.unshift({ id:appState.nextLogId++, operator:'admin', type:'文件恢复', target:'file', targetId:id, targetName:f.name, detail:JSON.stringify({freq_restore:origFreq}), result:1, ip:'192.168.1.100', time:new Date().toISOString().slice(0,19).replace('T',' ') });
  toast(`「${f.name}」已恢复，频次已加回`,'success');
  renderResources();
}

function thoroughDeleteFile(id) {
  const f = appState.files.find(fl=>fl.id===id);
  if(!f) return;
  showConfirm(`⚠ 确定彻底删除「${f.name}」？`,'此操作不可逆！文件及关联频次溯源数据将永久删除。',()=>{
    appState.files = appState.files.filter(fl=>fl.id!==id);
    appState.logs.unshift({ id:appState.nextLogId++, operator:'admin', type:'文件彻底删除', target:'file', targetId:id, targetName:f.name, detail:JSON.stringify({thorough_delete:true}), result:1, ip:'192.168.1.100', time:new Date().toISOString().slice(0,19).replace('T',' ') });
    checkAndClearTagsForFile(f);
    toast(`「${f.name}」已彻底删除`,'success');
    renderResources();
  });
}

function handleFileSelect(fileList) {
  window._uploadState.files = [...fileList];
  const listEl = $('uploadFileList');
  const btn = $('startUploadBtn');
  if(!listEl) return;
  if(fileList.length === 0) {
    listEl.innerHTML = '';
    if(btn) btn.disabled = true;

  }
  if(btn) btn.disabled = false;

  listEl.innerHTML = `<div style="font-size:12px;font-weight:500;margin-bottom:8px;color:var(--text-secondary);">已选择 ${fileList.length} 个文件：</div>` +
    Array.from(fileList).map((f,i) => `

window.removeUploadFile = function(idx) {
  const dt = new DataTransfer();
  const files = window._uploadState.files;
  for(let i=0;i<files.length;i++) if(i!==idx) dt.items.add(files[i]);
  window._uploadState.files = [...dt.files];
  handleFileSelect(dt.files);
};

function executeFileUpload() {
  const state = window._uploadState;
  if(!state || state.files.length === 0) return;

  const bodyEl = $('modalBody');
  const listEl = $('uploadFileList');

  // Show progress UI
  listEl.innerHTML = `<div style="padding:12px;">
    <div style="font-size:13px;font-weight:500;margin-bottom:12px;">正在处理文件...</div>
    ${Array.from(state.files).map((f, i) => `
      <div style="margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">
          <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;">${f.name}</span>
          <span id="upStatus${i}" style="color:var(--info);">等待中...</span>
        </div>
        <div style="height:6px;background:#E5E7EB;border-radius:3px;overflow:hidden;">
          <div id="upProgress${i}" style="height:100%;width:0%;background:var(--primary);border-radius:3px;transition:width 300ms ease;"></div>
        </div>
      </div>
    `).join('')}
  </div>`;

  // Disable button
  const btn = $('startUploadBtn');
  if(btn) { btn.disabled = true; btn.textContent = '处理中...'; }

  // Simulate processing each file
  let completed = 0;
  const totalNewWords = Math.floor(Math.random()*30)+10;
  const totalFreqAdd = Math.floor(Math.random()*400)+100;

  state.files.forEach((f, i) => {
    const duration = 1500 + Math.random() * 2500;
    let progress = 0;
    const statusEl = $(`upStatus${i}`);
    const progEl = $(`upProgress${i}`);

    const interval = setInterval(() => {
      progress += Math.random() * 15 + 5;
      if(progress >= 100) progress = 100;
      if(progEl) progEl.style.width = progress + '%';

      if(progress < 40) {
        if(statusEl) statusEl.textContent = '校验文件...';
      } else if(progress < 70) {
        if(statusEl) statusEl.textContent = 'AI 识别单词中...';
      } else if(progress < 95) {
        if(statusEl) statusEl.textContent = '累加频次...';
      } else {
        clearInterval(interval);
        if(statusEl) { statusEl.textContent = '✅ 完成'; statusEl.style.color = 'var(--success)'; }
        completed++;

        // Add mock file to data
        const newId = 'f' + String(appState.files.length + 1).padStart(3, '0');
        const wordCount = Math.floor(Math.random()*300)+50;
        const freqInc = Math.floor(Math.random()*500)+50;
        const ext = f.name.split('.').pop().toUpperCase();
        const typeMap = {'pdf':'PDF','docx':'Word','doc':'Word','xlsx':'Excel','xls':'Excel','txt':'TXT','jpg':'图片','png':'图片','jpeg':'图片','bmp':'图片'};

        appState.files.push({
          id: newId,
          name: f.name,
          type: typeMap[ext.toLowerCase()]||'未知',
          size: (f.size/1024/1024).toFixed(1)+'MB',
          tag: state.tag,
          folder: state.folder,
          status: 0,
          wordCount: wordCount,
          freqIncrement: freqInc,
          uploader: 'admin',
          uploadTime: new Date().toISOString().slice(0,16).replace('T',' ')
        });

        appState.logs.unshift({
          id:appState.nextLogId++, operator:'admin', type:'文件上传', target:'file',
          targetId:newId, targetName:f.name,
          detail:JSON.stringify({tag:state.tag,folder:state.folder,words:wordCount,freq:freqInc}),
          result:1, ip:'192.168.1.100', time:new Date().toISOString().slice(0,19).replace('T',' ')
        });

        // All done?
        if(completed === state.files.length) {
          setTimeout(() => {
            if(btn) btn.textContent = '开始上传';
            // Show summary
            listEl.innerHTML += `
              <div style="margin-top:16px;padding:14px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:var(--radius-md);">
                <div style="font-size:14px;font-weight:600;color:var(--success);margin-bottom:8px;">✅ 上传完成！</div>
                <div style="font-size:12px;color:var(--text-secondary);line-height:1.8;">
                  成功上传：<strong>${completed}</strong> 个文件<br>
                  识别新单词：约 <strong>${totalNewWords}</strong> 个<br>
                  累计频次增加：<strong>+${totalFreqAdd}</strong><br>
                  存放位置：<strong>${state.tag} / ${state.folder}</strong>
                </div>
              </div>
            `;
            if(btn) { btn.textContent = '继续上传'; btn.disabled = false; }
            renderResources();
          }, 400);
        }
      }
    }, 80);
  });
}

    </select>
    <input class="search-input" placeholder="搜索目标名称..." value="${appState.logFilter.keyword}" oninput="applyLogFilter('keyword',this.value)" style="width:180px;">
    <input type="date" value="${appState.logFilter.dateStart}" onchange="applyLogFilter('dateStart',this.value)" style="height:32px;border:1px solid var(--border-default);border-radius:6px;padding:0 8px;font-size:12px;font-family:var(--font-family);" title="起始日期">
    <span style="color:var(--text-tertiary);">—</span>
    <input type="date" value="${appState.logFilter.dateEnd}" onchange="applyLogFilter('dateEnd',this.value)" style="height:32px;border:1px solid var(--border-default);border-radius:6px;padding:0 8px;font-size:12px;font-family:var(--font-family);" title="结束日期">
    <span style="font-size:12px;color:var(--text-secondary);">共 ${getFilteredLogs().length} 条日志</span>
    <button class="btn btn-secondary btn-sm" style="margin-left:auto;" onclick="simulateLogExport()">导出 Excel</button>
  `;

  const page = appState.logPage;
  const perPage = appState.pageSizes.logs;
  const filtered = getFilteredLogs();
  const totalPages = Math.ceil(filtered.length/perPage)||1;
  const paged = filtered.slice((page-1)*perPage, page*perPage);

  setTableHTML('logTable', `
    <thead><tr>
      <th>ID</th><th>操作人</th><th>操作类型</th><th>目标</th><th>结果</th><th>IP</th><th>操作时间</th><th>操作</th>
    </tr></thead>
    <tbody>${paged.map(l=>`
      <tr>
        <td>${l.id}</td>
        <td>${l.operator}</td>
        <td><span class="status-badge ${l.type.includes('通过')?'online':l.type.includes('删除')||l.type.includes('失效')?'offline':l.type.includes('上架')?'online':'review'}">${l.type}</span></td>
        <td>${l.targetName||'-'}</td>
        <td>${l.result===1?'<span style="color:var(--success);">✓ 成功</span>':'<span style="color:var(--danger);">✕ 失败</span>'}</td>
        <td class="text-mono">${l.ip}</td>
        <td style="font-size:12px;">${l.time}</td>
        <td><button class="btn btn-info btn-sm" onclick="viewLogDetail(${l.id})">详情</button></td>
      </tr>
    `).join('')}</tbody>`);

  $('logPagination').innerHTML = renderPagination(page, totalPages, 'goLogPage', 'logs', filtered.length);
}

function applyLogFilter(field, value) {
  appState.logFilter[field] = value;
  appState.logPage = 1;
  renderLogs();
}
function goLogPage(page) { appState.logPage = page; renderLogs(); }
function goResourcePage(page) { appState.resourcePage = page; renderResources(); }
function goAdminPage(page) { appState.adminPage = page; renderAdmins(); }
function goInflectionPage(page) { appState.inflectionPage = page; renderInflections(); }
function goBlacklistPage(page) { appState.blacklistPage = page; renderBlacklist(); }
function goPhrasePage(page) { appState.phrasePage = page; renderPhrases(); }
function goPhraseReviewPage(page) { appState.phraseReviewPage = page; renderPhraseReview(); }
function goPhraseBlacklistPage(page) { appState.phraseBlacklistPage = page; renderPhraseBlacklist(); }

function viewLogDetail(id) {
  const l = appState.logs.find(l=>l.id===id);
  if(!l) return;
  $('modalTitle').textContent = '日志详情';
  $('modalBox').classList.toggle('wide', false);
  let detailHtml = '';
  try { const d=JSON.parse(l.detail||'{}'); detailHtml = Object.entries(d).map(([k,v])=>`<div style="padding:2px 0;font-size:12px;"><strong>${k}:</strong> ${typeof v==='object'?JSON.stringify(v):v}</div>`).join(''); } catch(e) { detailHtml = l.detail||'无'; }
  $('modalBody').innerHTML = `
    <div class="detail-grid">
      <div class="detail-item"><div class="detail-label">操作人</div><div class="detail-value">${l.operator}</div></div>
      <div class="detail-item"><div class="detail-label">操作类型</div><div class="detail-value">${l.type}</div></div>
      <div class="detail-item"><div class="detail-label">目标类型</div><div class="detail-value">${l.target}</div></div>
      <div class="detail-item"><div class="detail-label">目标ID</div><div class="detail-value text-mono">${l.targetId||'-'}</div></div>
      <div class="detail-item"><div class="detail-label">目标名称</div><div class="detail-value">${l.targetName||'-'}</div></div>
      <div class="detail-item"><div class="detail-label">结果</div><div class="detail-value">${l.result===1?'<span style="color:var(--success);">成功</span>':'<span style="color:var(--danger);">失败</span>'}</div></div>
      <div class="detail-item"><div class="detail-label">IP地址</div><div class="detail-value text-mono">${l.ip}</div></div>
      <div class="detail-item"><div class="detail-label">操作时间</div><div class="detail-value">${l.time}</div></div>
    </div>
    <div class="detail-section"><h4>操作详情（JSON）</h4><pre style="background:#F8FAFC;padding:12px;border-radius:var(--radius-md);font-size:12px;overflow-x:auto;line-height:1.6;">${detailHtml||'无'}</pre></div>
  `;
  $('modalFooter').innerHTML = `<button class="btn btn-secondary" onclick="closeModal()">关闭</button>`;
  showModal();
}

function simulateLogExport() {
  toast('模拟导出：已导出当前筛选条件下的日志（原型演示）','success');
}

// ============================================================
// MODAL SYSTEM
// ============================================================
function showModal() { $('modalOverlay').classList.add('show'); }
function closeModal() { $('modalOverlay').classList.remove('show'); }

function showConfirm(title, sub, onConfirm) {
  $('modalTitle').textContent = '确认操作';
  $('modalBox').classList.toggle('wide', false);
  $('modalBody').innerHTML = `
    <div class="confirm-content">
      <div class="confirm-icon">⚠️</div>
      <div class="confirm-text">${title}</div>
      <div class="confirm-sub">${sub}</div>
    </div>
  `;
  $('modalFooter').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">取消</button>
    <button class="btn btn-danger" id="confirmBtn" onclick="">确认</button>
  `;
  $('confirmBtn').onclick = ()=>{ closeModal(); onConfirm(); };
  showModal();
}

// ============================================================
// PAGINATION HELPER
// ============================================================
function renderPagination(page, totalPages, fnName, pageKey, totalCount) {
  if(totalPages <= 0) return '';
  const pSize = appState.pageSizes[pageKey] || 20;
  const sizes = [15,20,35,40,50,70,100];
  let html = '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center;">';
  // Total count (left)
  if(totalCount !== undefined) {
    html += `<span style="font-size:12px;color:var(--text-secondary);margin-right:8px;">共 <strong style="color:var(--text-primary);">${totalCount}</strong> 条</span>`;
  }
  // First page
  html += `<button ${page<=1?'disabled':''} onclick="${fnName}(1)" title="首页">&#171;</button>`;
  // Previous
  html += `<button ${page<=1?'disabled':''} onclick="${fnName}(${page-1})" title="上一页">&#8249;</button>`;
  // Page numbers
  for(let i=1; i<=totalPages; i++) {
    if(totalPages>7&&i>2&&i<totalPages-1&&Math.abs(i-page)>2) {
      if(i===3||i===totalPages-2) html += '<span style="color:var(--text-tertiary);padding:0 2px;">...</span>';
      continue;
    }
    html += `<button class="${i===page?'active':''}" onclick="${fnName}(${i})">${i}</button>`;
  }
  // Next
  html += `<button ${page>=totalPages?'disabled':''} onclick="${fnName}(${page+1})" title="下一页">&#8250;</button>`;
  // Last page
  html += `<button ${page>=totalPages?'disabled':''} onclick="${fnName}(${totalPages})" title="末页">&#187;</button>`;
  // Jump to page
  html += `<span class="page-info">第 ${page}/${totalPages} 页</span>`;
  if(totalPages > 1) {
    html += `<input type="number" value="${page}" min="1" max="${totalPages}" onkeydown="if(event.key==='Enter')${fnName}(parseInt(this.value)||1)" onchange="${fnName}(parseInt(this.value)||1)" style="width:48px;height:28px;border:1px solid #D1D5DB;border-radius:4px;text-align:center;font-size:11px;font-family:var(--font-family);" title="跳至">`;
  }
  // Page size
  html += `<span style="font-size:11px;color:var(--text-tertiary);">每页</span>`;
  html += `<select onchange="setPageSize('${pageKey}',this.value)" style="height:28px;border:1px solid #D1D5DB;border-radius:4px;font-size:11px;padding:0 4px;font-family:var(--font-family);">`;
  sizes.forEach(s => html += `<option value="${s}" ${pSize===s?'selected':''}>${s}</option>`);
  if(!sizes.includes(pSize)) html += `<option value="${pSize}" selected>${pSize}</option>`;
  html += `</select><span style="font-size:11px;color:var(--text-tertiary);">条</span>`;
  html += '</div>';
  return html;
}

function setPageSize(key, size) {
  appState.pageSizes[key] = parseInt(size)||20;
  // Reset to page 1
  const pageKey = key==='dashboard'?'dashboardPage':key==='words'?'wordPage':key==='review'?'reviewPage':key==='tags'?'tagPage':key==='resources'?'resourcePage':key==='logs'?'logPage':key==='admins'?'adminPage':key==='inflections'?'inflectionPage':key==='phrases'?'phrasePage':key==='phrase-review'?'phraseReviewPage':key==='phrase-blacklist'?'phraseBlacklistPage':key==='blacklist'?'blacklistPage':key;
  appState[pageKey] = 1;
  refreshPage(key);
}

function toggleSelectAll(checkbox, className) {
  qsa(`.${className}`).forEach(cb=>cb.checked=checkbox.checked);
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', (e)=>{
  if(e.key==='Escape') closeModal();
  if(e.key==='Enter' && $('loginPage').style.display!=='none' && $('loginPage').style.display!=='none') handleLogin();
});

// Close modal on overlay click
$('modalOverlay').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
